h1{

#search{

#gallery{

button:hover{

#featured-img{
width:90%;
max-width:900px;

object-fit:cover;   
border-radius:15px;
margin-top:15px;
box-shadow:0 0 20px #7a00ff;
transition:0.3s;
}
  
#featured-img:hover{
transform:scale(1.02);

}

button{

<script>

function download(img){

let link = document.createElement("a");
link.href = img;
link.download = img;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

  window.onload = function(){

let gallery = document.getElementById("gallery");
let items = Array.from(gallery.children);

// shuffle logic
items.sort(() => Math.random() - 0.5);

// re-append
items.forEach(item => gallery.appendChild(item));

}



function searchWallpaper(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("wallpaper-card");

for(let i=0;i<cards.length;i++){

let img=cards[i].getElementsByTagName("img")[0].src.toLowerCase();

if(img.includes(input)){
cards[i].style.display="";
}else{
cards[i].style.display="none";
}

}

}

</script>
